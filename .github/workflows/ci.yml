name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ammar0990/calcify:latest
            ammar0990/calcify:${{ steps.tag.outputs.IMAGE_TAG }}

      - name: Update image tag in deployment.yaml
        run: |
          sed -i "s|ammar0990/calcify:.*|ammar0990/calcify:${{ steps.tag.outputs.IMAGE_TAG }}|g" k8s/deployment.yaml

      - name: Commit updated deployment.yaml
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/ammarahmad01/Calcify.git
          git add k8s/deployment.yaml
          git diff --staged --quiet || git commit -m "CI: update image tag to ${{ steps.tag.outputs.IMAGE_TAG }}"
          git push
