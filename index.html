<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcify</title>
    <link rel="icon" href="c2.jfif" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
    <div class="calculator">
        <h1 class="calcify-heading">Calcify</h1>
        <div class="display">
            <input type="text" id="result" disabled>
        </div>
        <div class="buttons">
            <button class="btn operator" onclick="clearScreen()">C</button>
            <button class="btn operator" onclick="deleteChar()">DEL</button>
            <button class="btn operator" onclick="append('%')">%</button>
            <button class="btn operator" onclick="append('/')">/</button>
            <button class="btn" onclick="append('7')">7</button>
            <button class="btn" onclick="append('8')">8</button>
            <button class="btn" onclick="append('9')">9</button>
            <button class="btn operator" onclick="append('*')">*</button>
            <button class="btn" onclick="append('4')">4</button>
            <button class="btn" onclick="append('5')">5</button>
            <button class="btn" onclick="append('6')">6</button>
            <button class="btn operator" onclick="append('-')">-</button>
            <button class="btn" onclick="append('1')">1</button>
            <button class="btn" onclick="append('2')">2</button>
            <button class="btn" onclick="append('3')">3</button>
            <button class="btn operator" onclick="append('+')">+</button>
            <button class="btn" onclick="append('0')">0</button>
            <button class="btn" onclick="append('.')">.</button>
            <button class="btn equal" onclick="calculate()">=</button>
        </div>
    </div>
    <script src="calculator.js"></script>

    <!-- History Panel -->
<div id="history-panel" style="margin-top:20px; font-family:sans-serif;">
  <h3>Calculation History</h3>
  <ul id="history-list"></ul>
</div>

<script>
  const BACKEND = 'http://13.233.132.168:30081';

  async function loadHistory() {
    try {
      const res = await fetch(`${BACKEND}/history`);
      const data = await res.json();
      const list = document.getElementById('history-list');
      list.innerHTML = data.map(h => `<li>${h.calculation} — ${new Date(h.time).toLocaleTimeString()}</li>`).join('');
    } catch(e) {}
  }

  async function saveCalculation(calc) {
    try {
      await fetch(`${BACKEND}/history`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ calculation: calc })
      });
      loadHistory();
    } catch(e) {}
  }

  loadHistory();
  setInterval(loadHistory, 5000);
</script>
</body>
</html>
